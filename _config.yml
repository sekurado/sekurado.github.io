title: sekurado
description: Java background, growing security focus, and whatever I'm building along the way.
url: https://sekurado.github.io
baseurl: ""

author:
  name: sekurado
  github: sekurado

lang: en

permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate

paginate: 10
paginate_path: "/blog/page:num/"

collections:
  projects:
    output: true
    permalink: /project/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /:title/
  - scope:
      path: ""
      type: projects
    values:
      layout: project

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
